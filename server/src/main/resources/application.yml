server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: takeout-server
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/takeout;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: info
    com.takeout: debug
