server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: takeout-server
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/takeout;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

takeout:
  upload:
    dir: ${TAKEOUT_UPLOAD_DIR:uploads}
    max-size-bytes: ${TAKEOUT_UPLOAD_MAX_SIZE_BYTES:2097152}
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
      - image/gif

logging:
  level:
    root: info
    com.takeout: debug
