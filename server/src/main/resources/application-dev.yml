spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/takeout-dev;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: org.h2.Driver
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update

logging:
  level:
    root: info
    com.takeout: debug
