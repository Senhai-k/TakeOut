spring:
  datasource:
    url: jdbc:h2:mem:takeout-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop

takeout:
  upload:
    dir: target/test-uploads
    max-size-bytes: 2097152
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
      - image/gif

logging:
  level:
    root: warn
    com.takeout: warn
